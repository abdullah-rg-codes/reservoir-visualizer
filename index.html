<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reservoir Visualizer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1 class="title">Reservoir Visualizer</h1>
        <p class="subtitle">Visualise how water fills between blocks</p>
      </header>
            <!-- Input Section -->
      <section class="input-section">
        <label class="input-label" for="heightInput">Block heights (comma-separated)</label>
        <div class="input-row">
          <input
            id="heightInput"
            class="input-field"
            type="text"
            value="0,4,0,0,0,6,0,6,4,0"
            placeholder="e.g. 0,4,0,0,0,6,0,6,4,0"
            aria-describedby="inputHint"
          />
          <button id="solveBtn" class="btn-solve">Solve</button>
        </div>
        <span id="inputHint" class="input-hint">Each value must be 0 or greater</span>

        <!-- Quick examples -->
        <div class="examples-row">
          <span class="examples-label">Try:</span>
          <button class="btn-example" data-value="0,4,0,0,0,6,0,6,4,0">Example 1</button>
          <button class="btn-example" data-value="3,0,2,0,4">Example 2</button>
          <button class="btn-example" data-value="0,1,0,2,1,0,1,3,2,1,2,1">Example 3</button>
        </div>
      </section>

      <!-- Result badge -->
      <div id="resultBadge" class="result-badge hidden">
        <span class="result-label">Water trapped</span>
        <span id="resultValue" class="result-value">0 units</span>
      </div>

      <!-- Error message -->
      <div id="errorMsg" class="error-msg hidden"></div>
      
    </main>
    <script src="script.js"></script>
  </body>
</html>
